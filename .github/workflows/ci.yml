name: CI

# No cloud credentials are configured or required anywhere in this workflow —
# see docs/adr/0003-local-first-contract-testing.md. `iac-validate` runs
# `terraform validate`/`tflint`/`checkov` and `bicep build`/`bicep lint`
# only — never `terraform apply` or `az deployment create`.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Mypy
        run: mypy src

      - name: Unit + contract tests
        run: pytest tests/unit tests/contract -q --cov=aegis --cov-report=term-missing

      - name: Integration tests (Testcontainers, uses the runner's local Docker)
        run: pytest tests/integration -q

  eval-gate:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run eval-gate (see docs/adr/0008 — scripted provider, no live model, no network)
        run: python -m aegis.eval.cli eval/cases --out eval-report.json

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: eval-report.json

  console:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: console/package-lock.json

      - name: Install dependencies
        working-directory: console
        run: npm ci

      - name: Lint
        working-directory: console
        run: npm run lint

      - name: Type-check and build
        working-directory: console
        run: npm run build

  iac-validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.8"

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.64.0

      - name: Install checkov
        run: pip install checkov

      - name: Install Bicep
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/download/v0.45.15/bicep-linux-x64
          chmod +x bicep
          sudo mv bicep /usr/local/bin/bicep

      - name: Terraform fmt
        working-directory: infra/terraform
        run: terraform fmt -check -diff

      - name: Terraform init (no backend — never applied, see README)
        working-directory: infra/terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate

      - name: tflint
        working-directory: infra/terraform
        run: tflint --init && tflint

      - name: checkov (AWS Terraform)
        working-directory: infra/terraform
        run: |
          checkov -d . --framework terraform --compact \
            --skip-check CKV2_AWS_57,CKV_AWS_109,CKV_AWS_111,CKV_AWS_356

      - name: Bicep build
        working-directory: infra/bicep
        run: bicep build main.bicep --stdout > /dev/null

      - name: Bicep lint
        working-directory: infra/bicep
        run: bicep lint main.bicep
