name: CI

# No cloud credentials are configured or required anywhere in this workflow —
# see docs/adr/0003-local-first-contract-testing.md. Provider/IaC jobs added
# in later sprints (build images, IaC static validation, eval-gate) extend
# this file but keep that constraint.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Mypy
        run: mypy src

      - name: Unit + contract tests
        run: pytest tests/unit tests/contract -q --cov=aegis --cov-report=term-missing

      - name: Integration tests (Testcontainers, uses the runner's local Docker)
        run: pytest tests/integration -q

  eval-gate:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run eval-gate (see docs/adr/0008 — scripted provider, no live model, no network)
        run: python -m aegis.eval.cli eval/cases --out eval-report.json

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: eval-report.json
